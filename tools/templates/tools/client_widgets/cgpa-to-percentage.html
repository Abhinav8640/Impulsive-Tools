<div id="c2p-app">
  <div class="field">
    <label for="c2p-cgpa">CGPA</label>
    <input type="number" id="c2p-cgpa" placeholder="e.g. 8.2" step="0.01" min="0" max="10">
  </div>
  <p class="field-hint" style="margin-top:-8px; margin-bottom:18px;">Uses the common formula Percentage = CGPA × 9.5. Your institution's exact formula may differ slightly.</p>
  <div class="result-panel" style="margin-top:0;">
    <div class="alert alert-success" style="display:flex; justify-content:space-between; align-items:center;">
      <span>Equivalent Percentage</span>
      <strong id="c2p-result" style="font-family:var(--font-mono); font-size:1.2rem;">0.00%</strong>
    </div>
  </div>
</div>
<script>
(function () {
  var cgpa = document.getElementById('c2p-cgpa');
  var result = document.getElementById('c2p-result');
  cgpa.addEventListener('input', function () {
    var c = parseFloat(cgpa.value) || 0;
    result.textContent = (c * 9.5).toFixed(2) + '%';
  });
})();
</script>
