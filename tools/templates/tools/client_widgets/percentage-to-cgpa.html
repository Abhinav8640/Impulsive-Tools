<div id="p2c-app">
  <div class="field">
    <label for="p2c-pct">Percentage (%)</label>
    <input type="number" id="p2c-pct" placeholder="e.g. 78" step="0.01">
  </div>
  <p class="field-hint" style="margin-top:-8px; margin-bottom:18px;">Uses the common formula CGPA = Percentage ÷ 9.5 (the standard used by many Indian universities). Your institution's exact formula may differ slightly.</p>
  <div class="result-panel" style="margin-top:0;">
    <div class="alert alert-success" style="display:flex; justify-content:space-between; align-items:center;">
      <span>Equivalent CGPA</span>
      <strong id="p2c-result" style="font-family:var(--font-mono); font-size:1.2rem;">0.00</strong>
    </div>
  </div>
</div>
<script>
(function () {
  var pct = document.getElementById('p2c-pct');
  var result = document.getElementById('p2c-result');
  pct.addEventListener('input', function () {
    var p = parseFloat(pct.value) || 0;
    result.textContent = (p / 9.5).toFixed(2);
  });
})();
</script>
